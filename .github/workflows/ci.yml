name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, dom, gd, json, libxml, mbstring, openssl, pdo, pdo_sqlite, simplexml, soap, zlib
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Syntax check
        run: find src/ public/ bin/ -name "*.php" | xargs php -l

      - name: Lint (PSR-12)
        run: vendor/bin/phpcs --standard=PSR12 -n src/ public/

      - name: Tests
        run: vendor/bin/phpunit --colors=always
